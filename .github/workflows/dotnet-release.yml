name: .NET SDK Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: dotnet-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MUXI_SDK_E2E_SERVER_URL: ${{ secrets.MUXI_SDK_E2E_SERVER_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Unit tests
        run: dotnet test --no-build --verbosity normal

      - name: Require test server
        run: |
          if [ -z "$MUXI_SDK_E2E_SERVER_URL" ]; then
            echo "::error::MUXI_SDK_E2E_SERVER_URL secret is not set"
            exit 1
          fi
          if ! curl -sf --max-time 10 "${MUXI_SDK_E2E_SERVER_URL}/ping" >/dev/null 2>&1 && \
             ! curl -sf --max-time 10 "${MUXI_SDK_E2E_SERVER_URL}" >/dev/null 2>&1; then
            echo "::error::Test server is not reachable at ${MUXI_SDK_E2E_SERVER_URL}"
            exit 1
          fi

      - name: Integration tests
        env:
          MUXI_SDK_E2E_KEY_ID: ${{ secrets.MUXI_SDK_E2E_KEY_ID }}
          MUXI_SDK_E2E_SECRET_KEY: ${{ secrets.MUXI_SDK_E2E_SECRET_KEY }}
          MUXI_SDK_E2E_FORMATION_ID: ${{ secrets.MUXI_SDK_E2E_FORMATION_ID }}
          MUXI_SDK_E2E_CLIENT_KEY: ${{ secrets.MUXI_SDK_E2E_CLIENT_KEY }}
          MUXI_SDK_E2E_ADMIN_KEY: ${{ secrets.MUXI_SDK_E2E_ADMIN_KEY }}
        run: dotnet test --no-build --verbosity normal --filter "Category=Integration"

  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MUXI_RELEASE_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute next version
        id: version
        run: |
          current=$(grep 'Version = ' src/Muxi/Version.cs | sed 's/.*"\([^"]*\)".*/\1/')
          major=$(echo "$current" | cut -d. -f1)
          cdate=$(echo "$current" | cut -d. -f2)
          cpatch=$(echo "$current" | cut -d. -f3)
          today=$(date -u +%Y%m%d)
          if [ "$cdate" = "$today" ]; then
            nextpatch=$((cpatch + 1))
          else
            nextpatch=0
          fi
          next="${major}.${today}.${nextpatch}"
          echo "version=$next" >> $GITHUB_OUTPUT

      - name: Set version in source
        run: |
          sed -i 's/Version = ".*"/Version = "${{ steps.version.outputs.version }}"/' src/Muxi/Version.cs
          sed -i 's/<Version>.*<\/Version>/<Version>${{ steps.version.outputs.version }}<\/Version>/' src/Muxi/Muxi.csproj

      - name: Build package
        run: dotnet pack src/Muxi/Muxi.csproj -c Release -o ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.MUXI_SDK_NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Muxi/Version.cs src/Muxi/Muxi.csproj
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            .NET SDK v${{ steps.version.outputs.version }}
            
            Install via NuGet:
            ```
            dotnet add package Muxi
            ```

  sync_develop:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.MUXI_RELEASE_TOKEN }}

      - name: Merge main into develop
        run: |
          git fetch origin main develop
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit -m "chore: sync main to develop [skip ci]"
          git push origin HEAD:develop
